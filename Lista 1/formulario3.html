<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow">
        <div class="card-header">
            <h3 class="mb-0">Formulário 3 - Sample Form</h3>
        </div>
        <div class="card-body">
            <form class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Partner Name</label>
                    <input type="text" class="form-control" >
                </div>

                <div class="col-md-6">
                    <label class="form-label">Partner Email ID</label>
                    <input type="email" class="form-control" >
                </div>

                <div class="col-md-6">
                    <label class="form-label">Partner Legal Name</label>
                    <input type="text" class="form-control" >
                </div>

                <div class="col-md-6">
                    <label class="form-label">Partner Mobile</label>
                    <input type="text" class="form-control">
                </div>

                <div class="col-24">
                    <label class="form-label">Partner Address</label>
                    <input type="text" class="form-control" >
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contract Start Date</label>
                    <input type="text" class="form-control"placeholder="Data Start">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contract Expiry Date</label>
                    <input type="text" class="form-control"placeholder="Date End">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Minimum Loan Amount</label>
                    <input type="number" class="form-control" >
                </div>

                <div class="col-md-4">
                    <label class="form-label">Maximum Loan Amount</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Interest Rate</label>
                    <input type="number" class="form-control"   >
                </div>

                <div class="col-4">
                    <label class="form-label">Deposit Amount</label>
                    <input type="number" class="form-control">
                </div>
                
                <div class="col-6">
                    <br><br><br><br><button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
