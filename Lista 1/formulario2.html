<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Formulário 2 - Cadastro de Cliente</h3>
            </div>
            <div class="card-body">
                <form class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label">Código</label>
                        <input type="text" class="form-control" placeholder="32">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" placeholder="Nome completo do cliente">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control" placeholder="cliente@dominio.com">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-control" placeholder="Somente números">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Nº Celular</label>
                        <input type="text" class="form-control" placeholder="(18) 99999-9999">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Telefone Fixo</label>
                        <input type="text" class="form-control" placeholder="(18) 3333-3333">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">CEP</label>
                        <input type="text" class="form-control" placeholder="19000-000">
                    </div>

                    <div class="col-md-5">
                        <label class="form-label">Logradouro</label>
                        <input type="text" class="form-control" placeholder="Rua 14">
                    </div>

                    <div class="col-md-1">
                        <label class="form-label">Nº</label>
                        <input type="text" class="form-control" placeholder="10">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Bairro</label>
                        <input type="text" class="form-control" placeholder="Centro">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Cidade</label>
                        <input type="text" class="form-control" placeholder="Presidente Prudente">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">UF</label>
                        <input type="text" class="form-control" placeholder="SP">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select class="form-select">
                            <option selected>Selecione</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Cadastrar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
