<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 4 - Novo Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box { max-width: 700px; margin: 60px auto; }
        .form-control, .form-select { height: 34px; font-size: 14px; }
        label { font-size: 13px; margin-bottom: 4px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 12px; }
        .btn-sm-custom { padding: 4px 14px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <h1>Novo Usuário</h1>
            <form class="row g-2">
            <div class="col-12">
                <label>Nome:</label>
                <input type="text" class="form-control" placeholder="Informe o nome.">
            </div>
            <div class="col-md-3">
                <label>CPF:</label>
                <input type="text" class="form-control" placeholder="Informe o cpf.">
            </div>
            <div class="col-md-6">
                <label>Endereço:</label>
                <input type="text" class="form-control" placeholder="Informe o endereço.">
            </div>
            <div class="col-md-3">
                <label>Nível:</label>
                <select class="form-select">
                    <option>---</option>
                </select>
            </div>
            <div class="col-md-5">
                <label>Email:</label>
                <input type="email" class="form-control" placeholder="Informe o email.">
            </div>
            <div class="col-md-4">
                <label>Senha:</label>
                <input type="password" class="form-control" placeholder="Informe a senha.">
            </div>
            <div class="col-md-3">
                <label>Status:</label>
                <select class="form-select">
                    <option>---</option>
                </select>
            </div>
            <div class="col-12 text-end mt-2">
                <button type="submit" class="btn btn-success btn-sm-custom">Enviar</button>
                <button type="reset" class="btn btn-light border btn-sm-custom">Cancelar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
