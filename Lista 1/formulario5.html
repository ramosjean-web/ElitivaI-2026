<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 5 - Billing address</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .checkout-box{max-width:420px;margin:60px auto;background:#f8f9fa;padding:18px;border:1px solid #eee;}
        .form-control,.form-select,.input-group-text{font-size:13px;height:34px;}
        label{font-size:13px;margin-bottom:4px;}
        h3{font-size:18px;margin-bottom:16px;}
    </style>
</head>
<body>
<div class="container">
    <div class="checkout-box">
        <h3>Billing address</h3>
        <form class="row g-3">
            <div class="col-md-6">
                <label>First name</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-md-6">
                <label>Last name</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-12">
                <label>Username</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" class="form-control" placeholder="Username">
                </div>
            </div>
            <div class="col-12">
                <label>Email <small class="text-muted">(Optional)</small></label>
                <input type="email" class="form-control" placeholder="you@example.com">
            </div>
            <div class="col-12">
                <label>Address</label>
                <input type="text" class="form-control" placeholder="1234 Main St">
            </div>
            <div class="col-12">
                <label>Address 2 <small class="text-muted">(Optional)</small></label>
                <input type="text" class="form-control" placeholder="Apartment or suite">
            </div>
            <div class="col-md-5">
                <label>Country</label>
                <select class="form-select"><option>Choose...</option></select>
            </div>
            <div class="col-md-4">
                <label>State</label>
                <select class="form-select"><option>Choose...</option></select>
            </div>
            <div class="col-md-3">
                <label>Zip</label>
                <input type="text" class="form-control">
            </div>
        </form>
    </div>
</div>
</body>
</html>
