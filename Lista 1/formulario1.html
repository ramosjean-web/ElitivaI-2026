<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Exercícios - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-5">Lista de Exercícios - Bootstrap</h1>

    <!-- Formulário 1 -->
    <div class="card mb-5 shadow-sm">
      <div class="card-header"><h3>Formulário 1</h3></div>
      <div class="card-body">
        <form class="row g-3">
          <div class="col-md-6"><label class="form-label">First name</label><input type="text" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Last name</label><input type="text" class="form-control"></div>
          <div class="col-md-12"><label class="form-label">Username</label><div class="input-group"><span class="input-group-text">@</span><input type="text" class="form-control"></div></div>
          <div class="col-md-6"><label class="form-label">City</label><input type="text" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">State</label><input type="text" class="form-control"></div>
          <div class="col-md-3"><label class="form-label">Zip</label><input type="text" class="form-control"></div>
          <div class="col-12 form-check"><input class="form-check-input" type="checkbox"><label class="form-check-label">Agree to terms and conditions</label></div>
          <div class="col-12"><button class="btn btn-primary">Enviar</button></div>
        </form>
      </div>
    </div>
